<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <title>redirecting...</title>
</head>
<body>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { firebaseConfig } from "/config.js";

    const FALLBACK = "https://spencerhedges.com/fwd/";

    // path is like /abc123 , grab the first chunk after the slash
    const code = location.pathname.replace(/^\/+/, "").split("/")[0];

    function bail() { location.replace(FALLBACK); }

    // firestore-ish random id for the hit doc (we cant get an auto id back from a beacon)
    function hitId() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let out = "";
      for (let i = 0; i < 20; i++) out += chars[Math.floor(Math.random() * chars.length)];
      return out;
    }

    // sticky visitor id so we can tell unique people apart from raw clicks.
    // private mode can throw on localStorage, so if that happens we just treat
    // every hit as a brand new visitor (no worse than not knowing).
    function visitor() {
      try {
        let v = localStorage.getItem("liinkr_vid");
        if (v) return { vid: v, fresh: false };
        v = hitId();
        localStorage.setItem("liinkr_vid", v);
        return { vid: v, fresh: true };
      } catch (e) {
        return { vid: hitId(), fresh: true };
      }
    }

    // rough device bucket off the UA. good enough to eyeball mobile vs desktop.
    function deviceKind(ua) {
      if (/iPad|Tablet|PlayBook|Silk/.test(ua) || (/Android/.test(ua) && !/Mobile/.test(ua))) return "tablet";
      if (/Mobi|iPhone|iPod|Android.*Mobile|Windows Phone/.test(ua)) return "mobile";
      return "desktop";
    }

    // turn a plain object into firestore REST typed fields
    function toFields(obj) {
      const out = {};
      for (const k in obj) {
        const v = obj[k];
        if (typeof v === "string") out[k] = { stringValue: v };
        else if (typeof v === "boolean") out[k] = { booleanValue: v };
        else if (typeof v === "number") out[k] = Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
      }
      return out;
    }

    // log a click from the visitors browser. uses the firestore REST commit endpoint
    // through sendBeacon so it still goes out even though were about to navigate away.
    // one commit = write the hit event + bump the links click counter.
    function logHit() {
      try {
        const base = "projects/" + firebaseConfig.projectId + "/databases/(default)/documents";
        const id = hitId();
        const ua = navigator.userAgent || "";
        const who = visitor();
        const now = new Date();
        const conn = navigator.connection || {};

        const data = {
          code: code,
          ref:  document.referrer || "",
          ua:   ua,
          lang: navigator.language || "",
          tz:   (Intl.DateTimeFormat().resolvedOptions().timeZone) || "",
          vid:  who.vid,
          fresh: who.fresh,
          dev:  deviceKind(ua),
          sw:   screen.width || 0,
          sh:   screen.height || 0,
          dpr:  window.devicePixelRatio || 1,
          net:  conn.effectiveType || "",
          hr:   now.getHours(),
          dow:  now.getDay(),
          dark: !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches),
          bot:  navigator.webdriver === true,
          qs:   (location.search || "").slice(1, 200)
        };

        const body = {
          writes: [
            {
              update: {
                name: base + "/hits/" + id,
                fields: toFields(data)
              },
              updateTransforms: [
                { fieldPath: "ts", setToServerValue: "REQUEST_TIME" }
              ],
              currentDocument: { exists: false }
            },
            {
              transform: {
                document: base + "/links/" + code,
                fieldTransforms: [
                  { fieldPath: "clicks", increment: { integerValue: "1" } },
                  { fieldPath: "lastHit", setToServerValue: "REQUEST_TIME" }
                ]
              }
            }
          ]
        };

        const url = "https://firestore.googleapis.com/v1/" + base + ":commit?key=" + firebaseConfig.apiKey;
        const blob = new Blob([JSON.stringify(body)], { type: "application/json" });

        if (!(navigator.sendBeacon && navigator.sendBeacon(url, blob))) {
          // older browser / beacon refused — fall back to a keepalive fetch
          fetch(url, { method: "POST", body: blob, keepalive: true }).catch(() => {});
        }
      } catch (e) {
        // analytics should never block the redirect
      }
    }

    if (!code) {
      bail();
    } else {
      const db = getFirestore(initializeApp(firebaseConfig));
      getDoc(doc(db, "links", code)).then((snap) => {
        const data = snap.exists() ? snap.data() : null;
        if (data && data.url) {
          logHit();
          location.replace(data.url);
        } else {
          bail();
        }
      }).catch(() => bail());
    }
  </script>
</body>
</html>
